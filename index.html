<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual MDT</title>
    <link rel="icon" type="image/png" href="./assets/logo.png">
    <style>
        :root {
            --bg-primary: #0d0f14;
            --bg-secondary: #141722;
            --bg-tertiary: #1e2232;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            
            /* GOLDEN THEME SYSTEM TRANSITION */
            --accent: #d4af37;          /* Metallic Gold */
            --accent-hover: #aa8c2c;    /* Deep Gold */
            --accent-light: #fbbf24;    /* Bright Yellow Gold */
            --border-color: #2d2716;    /* Dark Gold/Bronze Border */
            
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;

            /* Navigation Layout Dimensions */
            --sidebar-width: 280px;
            --header-mobile-height: 65px;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }
        
        body { 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ELEGANT RADAR PRELOADER SYSTEM OVERLAY */
        #appPreloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-primary);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s;
        }
        
        .radar-spinner {
            width: 64px;
            height: 64px;
            position: relative;
            background: rgba(212, 175, 55, 0.03);
            border: 2px solid var(--border-color);
            border-radius: 50%;
        }
        .radar-spinner::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border: 2px solid transparent;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spinRadar 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        
        .preloader-text {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            animation: pulseText 1.5s ease-in-out infinite;
        }

        /* Main application container state framework */
        #mainAppContent {
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @keyframes spinRadar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; color: var(--accent-light); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* Mobile Top Navigation Bar */
        header { 
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color); 
            padding: 0 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-mobile-height);
            z-index: 100;
        }
        header h1 { 
            font-size: 16px; 
            font-weight: 700; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            color: var(--accent-light); 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Brand Logo Style Optimization */
        .mdt-logo {
            width: 24px;
            height: 24px;
            object-fit: contain;
            filter: drop-shadow(0 0 4px rgba(214, 175, 55, 0.4));
        }

        /* Mobile Hamburger Icon Setup */
        .menu-toggle {
            background: transparent;
            border: none;
            color: var(--accent-light);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 5px;
            z-index: 110;
        }
        .menu-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background-color: currentColor;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        /* Mobile Bottom Sheet Drawer Layout Framework */
        .sidebar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            transform: translateY(100%);
            width: 100%;
            height: auto;
            max-height: 45vh; 
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            border-radius: 20px 20px 0 0;
            display: flex;
            flex-direction: column;
            z-index: 105;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -8px 24px -4px rgba(0, 0, 0, 0.6);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .sidebar.open { transform: translateY(0); }
        .sidebar::before {
            content: '';
            display: block;
            width: 40px;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 12px auto 6px auto;
        }

        .sidebar-header {
            padding: 10px 20px 15px 20px;
            text-align: center;
        }
        .sidebar-header h1 {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .nav-menu {
            padding: 10px 20px 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .tab-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s ease;
            text-align: center;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        .tab-btn:hover { color: var(--text-main); background: var(--bg-tertiary); border-color: var(--accent); }
        .tab-btn.active { background: rgba(212, 175, 55, 0.12); color: var(--accent-light); border: 1px solid var(--accent); }

        /* Dark Fog Backdrop Overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            z-index: 102;
        }
        .sidebar-overlay.visible { display: block; }

        /* View Content Context Wrapper */
        main {
            flex: 1;
            padding: 20px;
            margin-top: var(--header-mobile-height);
            margin-bottom: 85px; 
            width: 100%;
        }
        
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }

        /* Charge Sheet Layout */
        .calculator-layout { display: flex; flex-direction: column; gap: 20px; }
        .robbery-grid { display: flex; flex-direction: column; gap: 14px; width: 100%; }
        
        .card { 
            background: var(--bg-secondary); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            gap: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }
        .card h3 { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.3px; }
        .card-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .card-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 12px; }
        .btn-add { background: var(--accent); border: none; color: #0d0f14; padding: 8px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 12px; transition: background 0.15s ease; }
        .btn-add:hover { background: var(--accent-light); }

        /* MOBILE EXCLUSIVE: Elegant Bottom Sheet Popup for Booking Summary */
        .basket-panel { 
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary); 
            border-top: 2px solid var(--accent); 
            border-radius: 20px 20px 0 0; 
            padding: 15px 20px; 
            z-index: 101;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
            max-height: 70px; 
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Trigger class when user clicks the floating bar to open it */
        .basket-panel.expanded {
            max-height: 80vh;
            overflow: visible;
        }

        /* Interactive Header for Mobile Floating Summary Bar */
        .basket-header-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding-bottom: 12px;
        }

        .basket-title { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; color: var(--accent-light); display: flex; align-items: center; gap: 8px; }
        .basket-title::after {
            content: '▲ Tap to view';
            font-size: 10px;
            color: var(--accent-light);
            text-transform: none;
            font-weight: normal;
            box-shadow: none;
        }
        .basket-panel.expanded .basket-title::after { content: '▼ Close panel'; }

        .basket-items { max-height: 260px; overflow-y: auto; margin-bottom: 20px; display: none; }
        .basket-panel.expanded .basket-items { display: block; }
        
        .basket-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 10px 0; border-bottom: 1px solid var(--border-color); gap: 10px; }
        .basket-item span { color: #cbd5e1; }
        .basket-item strong { color: var(--accent-light); white-space: nowrap; font-weight: 600; background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px; font-size: 12px; border: 1px solid var(--border-color); }
        
        .totals { background: rgba(13, 15, 20, 0.5); padding: 16px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; flex-direction: row; flex-wrap: wrap; gap: 15px; justify-content: space-between; }
        .basket-panel.expanded .totals { flex-direction: column; gap: 8px; }

        .total-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); flex: 1; min-width: 100px; }
        .total-row span:last-child { color: var(--text-main); font-weight: 600; margin-left: 5px; }
        .total-row.grand-total { font-size: 13px; font-weight: bold; color: #fff; border-top: none; padding-top: 0; }
        .total-row.grand-total span:last-child { color: var(--accent-light); font-size: 14px; }

        .basket-panel.expanded .total-row { flex: none; width: 100%; }
        .basket-panel.expanded .total-row.grand-total { margin-top: 4px; padding-top: 10px; border-top: 1px dashed var(--border-color); font-size: 14px; }
        .basket-panel.expanded .total-row.grand-total span:last-child { font-size: 16px; color: var(--accent-light); text-shadow: 0 0 8px rgba(212, 175, 55, 0.3); }

        /* Penal Code Utilities Bar */
        .filter-bar { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; width: 100%; }
        .search-box { background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 8px; color: white; width: 100%; font-size: 13px; transition: border-color 0.2s ease; }
        .search-box:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 8px rgba(212, 175, 55, 0.15); }
        .filter-buttons-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; width: 100%; scrollbar-width: none; }
        .filter-buttons-scroll::-webkit-scrollbar { display: none; }
        .filter-btn { background: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; transition: all 0.15s ease; }
        .filter-btn:hover { color: #fff; background: var(--bg-tertiary); border-color: var(--accent); }
        .filter-btn.active { background: rgba(212, 175, 55, 0.1); border-color: var(--accent); color: var(--accent-light); }

        /* Dynamic Table Grid Layout */
        .table-container { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; overflow-x: auto; width: 100%; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; min-width: 800px; }
        th { background: #161924; color: var(--accent-light); padding: 16px 20px; font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-color); }
        td { padding: 14px 20px; border-bottom: 1px solid var(--border-color); color: #cbd5e1; vertical-align: middle; line-height: 1.4; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #1a1d2a; color: #fff; }
        
        /* Modernized Golden Theme Category Pills */
        .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
        .badge-traffic { background: rgba(148, 163, 184, 0.12); color: #cbd5e1; border: 1px solid rgba(148, 163, 184, 0.25); }
        .badge-infraction { background: rgba(251, 191, 36, 0.08); color: #fde047; border: 1px solid rgba(251, 191, 36, 0.2); }
        .badge-misdemeanor { background: rgba(245, 158, 11, 0.12); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.25); }
        .badge-felony { background: rgba(212, 175, 55, 0.15); color: #fef08a; border: 1px solid rgba(212, 175, 55, 0.3); }
        .badge-hut { background: rgba(217, 119, 6, 0.15); color: #f59e0b; border: 1px solid rgba(217, 119, 6, 0.25); }
        .badge-internal-affairs { background: rgba(254, 240, 138, 0.1); color: #ca8a04; border: 1px solid rgba(254, 240, 138, 0.2); }

        /* Animation States for Hamburger Menu Drawer Toggle */
        .menu-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .menu-toggle.open span:nth-child(2) { opacity: 0; }
        .menu-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* Desktop View Layout Shifts (>= 992px) */
        @media (min-width: 992px) {
            header { display: none; }
            .menu-toggle { display: none; }
            .sidebar-overlay { display: none !important; }

            /* Revert back to desktop standard side navbar panel */
            .sidebar { 
                top: 0; bottom: 0; left: 0 !important; right: auto;
                transform: none !important; width: var(--sidebar-width); height: 100vh;
                max-height: none; border-top: none; border-right: 1px solid var(--border-color);
                border-radius: 0; box-shadow: none;
            }
            .sidebar::before { display: none; }
            .sidebar-header { display: block; padding: 24px 20px; text-align: left; border-bottom: 1px solid var(--border-color); }
            .sidebar-header h1 { font-size: 16px; color: var(--accent-light); justify-content: flex-start; }

            .nav-menu { padding: 20px 12px; gap: 6px; flex: 1; overflow-y: auto; }
            .tab-btn { background: transparent; border: none; padding: 14px 16px; font-size: 13px; text-align: left; border-radius: 8px; }
            .tab-btn:hover { color: var(--accent-light); background: rgba(212, 175, 55, 0.05); }
            .tab-btn.active { 
                background: rgba(212, 175, 55, 0.12); color: var(--accent-light); border-left: 3px solid var(--accent); 
                border-radius: 4px 8px 8px 4px; padding-left: 13px; border-top: none; border-bottom: none; border-right: none;
            }

            main { margin-left: var(--sidebar-width); margin-top: 0; padding: 40px; margin-bottom: 0; width: calc(100% - var(--sidebar-width)); }

            .calculator-layout { display: grid; grid-template-columns: 1fr 400px; gap: 24px; align-items: start; }
            .robbery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
            
            /* Revert summary panel back to an elegant stationary side block */
            .basket-panel { 
                position: sticky; top: 40px; left: auto; right: auto; bottom: auto;
                max-height: none !important; border-top: none; border: 1px solid var(--border-color);
                border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); padding: 20px; overflow: visible;
            }
            .basket-header-toggle { cursor: default; pointer-events: none; }
            .basket-title::after { display: none; }
            .basket-items { display: block; }
            .totals { background: rgba(13, 15, 20, 0.5); padding: 16px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px; }
            .total-row { flex: none; width: 100%; }
            .total-row.grand-total { margin-top: 4px; padding-top: 10px; border-top: 1px dashed var(--border-color); font-size: 14px; }
            .total-row.grand-total span:last-child { font-size: 16px; }
        }
    </style>
</head>
<body>

    <!-- VISUAL PRELOADER SCREEN OVERLAY CONTAINER -->
    <div id="appPreloader">
        <div class="radar-spinner"></div>
        <div class="preloader-text" id="preloaderText">Downloading Core Database...</div>
    </div>

    <!-- MAIN APPLICATION CONTAINER WRAPPER -->
    <div id="mainAppContent">
        <div class="app-container">
            <header>
                <h1>
                    <img src="./assets/logo.png" alt="MDT Logo" class="mdt-logo">
                    Virtual MDT
                </h1>
                <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()" aria-label="Toggle Navigation Drawer">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </header>

            <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
            <nav class="sidebar" id="sidebarMenu">
                <div class="sidebar-header">
                    <h1>
                        <img src="./assets/logo.png" alt="MDT Logo" class="mdt-logo">
                        Virtual MDT
                    </h1>
                </div>
                <div class="nav-menu">
                    <button class="tab-btn active" onclick="switchTab('charge-sheet')">CHARGE SHEET</button>
                    <button class="tab-btn" onclick="switchTab('penal-codes')">PENAL CODES DIRECTORY</button>
                </div>
            </nav>

            <main>
                <!-- Charge Sheet Tab Panel -->
                <div id="charge-sheet" class="tab-content active">
                    <div class="calculator-layout">
                        <div class="robbery-grid" id="robberyGrid"></div>

                        <!-- Optimized Booking Summary Bottom Sheet System -->
                        <div class="basket-panel" id="summaryPanel">
                            <div class="basket-header-toggle" onclick="toggleSummaryPanel()">
                                <div class="basket-title">Booking Summary</div>
                            </div>
                            <div class="basket-items" id="basketItems">
                                <p style="color: var(--text-muted); font-size: 13px; text-align: center; padding-top: 30px;">No operational presets loaded</p>
                            </div>
                            <div class="totals">
                                <div class="total-row"><span>Fine:</span><span id="summaryFine">$0</span></div>
                                <div class="total-row"><span>Time:</span><span id="summaryTime">0 Months</span></div>
                                <div class="total-row grand-total"><span>Cap:</span><span id="summaryCap">N/A</span></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Penal Codes Tab Panel -->
                <div id="penal-codes" class="tab-content">
                    <div class="filter-bar">
                        <input type="text" id="searchBox" class="search-box" placeholder="Search parameters or data metrics..." oninput="filterTable()">
                        <div class="filter-buttons-scroll">
                            <button class="filter-btn active" onclick="filterCategory('all', this)">All Codes</button>
                            <button class="filter-btn" onclick="filterCategory('traffic', this)">Traffic</button>
                            <button class="filter-btn" onclick="filterCategory('infraction', this)">Infraction</button>
                            <button class="filter-btn" onclick="filterCategory('misdemeanor', this)">Misdemeanor</button>
                            <button class="filter-btn" onclick="filterCategory('felony', this)">Felony</button>
                            <button class="filter-btn" onclick="filterCategory('hut', this)">H.U.T</button>
                            <button class="filter-btn" onclick="filterCategory('internal_affairs', this)">Internal Affairs</button>
                        </div>
                    </div>

                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 25%">Offense</th>
                                    <th style="width: 15%">Classification</th>
                                    <th style="width: 42%">Statutory Definition</th>
                                    <th style="width: 10%">Fine</th>
                                    <th style="width: 8%">Jail Metric</th>
                                </tr>
                            </thead>
                            <tbody id="penalCodesTableBody">
                                <tr>
                                    <td colspan="5" style="color: var(--text-muted); font-size: 13px; text-align: center; padding: 30px 0;">Loading legal code indexes...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let chargeSheetGroups = {};
        let penalCodes = {};
        let currentCategoryFilter = 'all';

        const getBaseUrl = () => {
            if (window.location.hostname.includes("github.io")) {
                return "https://ayazpatel.github.io/SCRP-VIRTUAL-MDT/";
            }
            return "./"; 
        };

        window.onload = async function() {
            const baseUrl = getBaseUrl();
            
            try {
                // parallel layout asset compilation pipeline fetching operations
                const [chargesResponse, penalCodesResponse] = await Promise.all([
                    fetch(`${baseUrl}chargesPresets.json`),
                    fetch(`${baseUrl}penalCodes.json`)
                ]);

                if (!chargesResponse.ok || !penalCodesResponse.ok) {
                    throw new Error("HTTP verification failed.");
                }

                chargeSheetGroups = await chargesResponse.json();
                penalCodes = await penalCodesResponse.json();

                // Run baseline card injections
                renderChargeSheetGrid();
                renderPenalCodesTable();

                // UNROLL RENDERING VIEWS ONCE PIPELINE PROMISES COMPLETE CLEANLY
                const preloader = document.getElementById('appPreloader');
                const content = document.getElementById('mainAppContent');
                
                preloader.style.opacity = '0';
                preloader.style.visibility = 'hidden';
                content.style.opacity = '1';

            } catch (error) {
                console.error("Data Fetch Error:", error);
                document.getElementById('preloaderText').innerText = `Sync Failed: ${error.message}`;
                document.getElementById('preloaderText').style.color = 'var(--danger)';
            }
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebarMenu');
            const overlay = document.getElementById('sidebarOverlay');
            const toggleBtn = document.getElementById('menuToggle');
            
            sidebar.classList.toggle('open');
            overlay.classList.toggle('visible');
            toggleBtn.classList.toggle('open');
        }

        function toggleSummaryPanel() {
            if (window.innerWidth >= 992) return; 
            const panel = document.getElementById('summaryPanel');
            panel.classList.toggle('expanded');
        }

        function switchTab(tabId) {
            const sidebar = document.getElementById('sidebarMenu');
            if (sidebar.classList.contains('open')) {
                toggleSidebar();
            }

            document.getElementById('summaryPanel').classList.remove('expanded');

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');

            document.querySelectorAll(`.tab-btn[onclick="switchTab('${tabId}')"]`).forEach(btn => {
                btn.classList.add('active');
            });
        }

        function renderChargeSheetGrid() {
            const grid = document.getElementById('robberyGrid');
            grid.innerHTML = '';

            for (const key in chargeSheetGroups) {
                const group = chargeSheetGroups[key];
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div>
                        <h3>${group.label}</h3>
                        <div class="card-meta">System Max: $${group.capFine.toLocaleString()} / ${group.capTime} Mos</div>
                    </div>
                    <div class="card-actions">
                        <span style="font-size:11px; color:var(--text-muted); font-weight:600;">Linked Crimes: ${group.charges.length}</span>
                        <button class="btn-add" onclick="populateSummary('${key}')">Load Preset</button>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function populateSummary(groupKey) {
            const group = chargeSheetGroups[groupKey];
            const basketItems = document.getElementById('basketItems');
            basketItems.innerHTML = '';

            let accumulatedFine = 0;
            let accumulatedTime = 0;

            group.charges.forEach(charge => {
                accumulatedFine += charge.fine;
                accumulatedTime += charge.jailTime;

                const itemRow = document.createElement('div');
                itemRow.className = 'basket-item';
                itemRow.innerHTML = `
                    <span>${charge.label}</span>
                    <strong>$${charge.fine.toLocaleString()} / ${charge.jailTime} Mo</strong>
                `;
                basketItems.appendChild(itemRow);
            });

            document.getElementById('summaryFine').innerText = `$${accumulatedFine.toLocaleString()}`;
            document.getElementById('summaryTime').innerText = `${accumulatedTime} Months`;
            document.getElementById('summaryCap').innerText = `$${group.capFine.toLocaleString()} / ${group.capTime} Months`;

            if (window.innerWidth < 992) {
                document.getElementById('summaryPanel').classList.add('expanded');
            }
        }

        function renderPenalCodesTable() {
            const tbody = document.getElementById('penalCodesTableBody');
            tbody.innerHTML = '';

            for (const key in penalCodes) {
                const item = penalCodes[key];
                const tr = document.createElement('tr');
                tr.setAttribute('data-category', item.category);
                tr.setAttribute('data-name', item.label.toLowerCase());
                tr.setAttribute('data-desc', item.description.toLowerCase());

                let badgeClass = `badge-${item.category.replace('_', '-')}`;
                let readableCategory = item.category.replace('_', ' ');

                let fineDisplay = item.fine === 999999 ? "Judicial Discretion" : `$${item.fine.toLocaleString()}`;
                let jailDisplay = item.jailTime === 999999 || item.jailTime === 9999999 || item.jailTime === 99999999 ? "H.U.T" : `${item.jailTime} Mos`;

                tr.innerHTML = `
                    <td style="font-weight:600; color:#fff">${item.label}</td>
                    <td><span class="badge ${badgeClass}">${readableCategory}</span></td>
                    <td>${item.description}</td>
                    <td style="font-weight:600; color:${item.fine === 999999 ? 'var(--text-muted)' : 'var(--accent-light)'}">${fineDisplay}</td>
                    <td style="font-weight:600; color:#fff">${jailDisplay}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        function filterCategory(category, element) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentCategoryFilter = category;
            filterTable();
        }

        function filterTable() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            const rows = document.querySelectorAll('#penalCodesTableBody tr');

            rows.forEach(row => {
                const categoryMatch = (currentCategoryFilter === 'all' || row.getAttribute('data-category') === currentCategoryFilter);
                const nameMatch = row.getAttribute('data-name').includes(query);
                const descMatch = row.getAttribute('data-desc').includes(query);

                if (categoryMatch && (nameMatch || descMatch)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
