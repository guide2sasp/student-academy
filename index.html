<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDT Criminal Calculator</title>
    <style>
        :root {
            --bg-primary: #12141c;
            --bg-secondary: #1a1d29;
            --bg-tertiary: #25293c;
            --text-main: #f0f2f5;
            --text-muted: #b3b9c9;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #2f354a;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 15px; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { margin-bottom: 15px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        h1 { font-size: 20px; color: var(--text-main); letter-spacing: 0.5px; }

        /* Tabs System */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: var(--bg-secondary); padding: 5px; border-radius: 8px; border: 1px solid var(--border-color); width: 100%; }
        .tab-btn { flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 10px 12px; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 6px; transition: all 0.2s ease; text-align: center; }
        .tab-btn:hover { color: var(--text-main); background: var(--bg-tertiary); }
        .tab-btn.active { background: var(--accent); color: white; }
        
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }

        /* Charge Sheet Layout (Mobile First: Sequential Flow) */
        .calculator-layout { display: flex; flex-direction: column; gap: 20px; }
        .robbery-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        
        .card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; gap: 12px; }
        .card h3 { font-size: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; color: #fff; }
        .card-meta { font-size: 12px; color: var(--text-muted); }
        .card-actions { display: flex; justify-content: space-between; align-items: center; }
        .btn-add { background: var(--accent); border: none; color: white; padding: 8px 16px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 12px; }
        .btn-add:hover { background: var(--accent-hover); }

        /* Summary Panel (Flows naturally on mobile, stays clean) */
        .basket-panel { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; height: fit-content; }
        .basket-title { font-size: 16px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid var(--border-color); font-weight: 600; }
        .basket-items { max-height: 200px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        .basket-item { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #232736; }
        .basket-item span { color: var(--text-muted); }
        .basket-item strong { color: var(--text-main); white-space: nowrap; }
        
        .totals { background: var(--bg-primary); padding: 12px; border-radius: 6px; border: 1px solid var(--border-color); }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
        .total-row:last-child { margin-bottom: 0; padding-top: 6px; border-top: 1px dashed var(--border-color); font-size: 15px; font-weight: bold; color: var(--success); }

        /* Penal Codes Tab Utilities */
        .filter-bar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; width: 100%; }
        .search-box { background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 10px 15px; border-radius: 6px; color: white; width: 100%; font-size: 14px; }
        .filter-buttons-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 5px; width: 100%; }
        .filter-btn { background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; }
        .filter-btn.active { background: var(--bg-primary); border-color: var(--accent); color: var(--accent); }

        /* Standard Table Configuration */
        .table-container { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; min-width: 700px; } /* Ensures table content remains intact on small viewports */
        th { background: var(--bg-tertiary); color: var(--text-main); padding: 12px 15px; font-weight: 600; border-bottom: 1px solid var(--border-color); }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); color: var(--text-muted); vertical-align: top; }
        tr:hover td { color: var(--text-main); background: #1e2230; }
        
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; white-space: nowrap; }
        .badge-traffic { background: #475569; color: #f8fafc; }
        .badge-infraction { background: #0284c7; color: #f0f9ff; }
        .badge-misdemeanor { background: #d97706; color: #fef3c7; }
        .badge-felony { background: #dc2626; color: #fef2f2; }
        .badge-hut { background: #7c3aed; color: #f5f3ff; }
        .badge-internal { background: #db2777; color: #fdf2f8; }

        /* Desktop & Tablet View Grid Activator (>= 768px) */
        @media (min-width: 768px) {
            body { padding: 20px; }
            h1 { font-size: 24px; }
            .tabs { width: fit-content; }
            .tab-btn { flex: none; padding: 10px 24px; font-size: 14px; }
            
            /* Responsive layout configurations */
            .calculator-layout { display: grid; grid-template-columns: 1fr 380px; gap: 20px; align-items: start; }
            .robbery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
            .basket-panel { position: sticky; top: 0; }
            
            .filter-bar { flex-direction: row; align-items: center; }
            .search-box { width: 250px; }
            .filter-buttons-scroll { overflow-x: visible; width: auto; }
        }
    </style>
</head>

        let currentCategoryFilter = 'all';

        window.onload = function() {
            renderChargeSheetGrid();
            renderPenalCodesTable();
        };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function renderChargeSheetGrid() {
            const grid = document.getElementById('robberyGrid');
            grid.innerHTML = '';

            for (const key in chargeSheetGroups) {
                const group = chargeSheetGroups[key];
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div>
                        <h3>${group.label}</h3>
                        <div class="card-meta">Max Cap: $${group.capFine.toLocaleString()} / ${group.capTime} Mos</div>
                    </div>
                    <div class="card-actions">
                        <span style="font-size:11px; color:var(--text-muted)">Charges: ${group.charges.length}</span>
                        <button class="btn-add" onclick="populateSummary('${key}')">Load Sheet</button>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function populateSummary(groupKey) {
            const group = chargeSheetGroups[groupKey];
            const basketItems = document.getElementById('basketItems');
            basketItems.innerHTML = '';

            let accumulatedFine = 0;
            let accumulatedTime = 0;

            group.charges.forEach(charge => {
                accumulatedFine += charge.fine;
                accumulatedTime += charge.jailTime;

                const itemRow = document.createElement('div');
                itemRow.className = 'basket-item';
                itemRow.innerHTML = `
                    <span>${charge.label}</span>
                    <strong>$${charge.fine} / ${charge.jailTime} Mo</strong>
                `;
                basketItems.appendChild(itemRow);
            });

            document.getElementById('summaryFine').innerText = `$${accumulatedFine.toLocaleString()}`;
            document.getElementById('summaryTime').innerText = `${accumulatedTime} Months`;
            document.getElementById('summaryCap').innerText = `$${group.capFine.toLocaleString()} / ${group.capTime} Months`;
        }

        function renderPenalCodesTable() {
            const tbody = document.getElementById('penalCodesTableBody');
            tbody.innerHTML = '';

            for (const key in penalCodes) {
                const item = penalCodes[key];
                const tr = document.createElement('tr');
                tr.setAttribute('data-category', item.category);
                tr.setAttribute('data-name', item.label.toLowerCase());
                tr.setAttribute('data-desc', item.description.toLowerCase());

                let badgeClass = `badge-${item.category.replace('_', '-')}`;
                let readableCategory = item.category.replace('_', ' ');

                let fineDisplay = item.fine === 999999 ? "Judicial Discretion" : `$${item.fine.toLocaleString()}`;
                let jailDisplay = item.jailTime === 999999 || item.jailTime === 9999999 || item.jailTime === 99999999 ? "H.U.T" : `${item.jailTime} Mos`;

                tr.innerHTML = `
                    <td style="font-weight:600; color:#fff">${item.label}</td>
                    <td><span class="badge ${badgeClass}">${readableCategory}</span></td>
                    <td>${item.description}</td>
                    <td style="font-weight:600; color:${item.fine === 999999 ? 'var(--text-muted)' : 'white'}">${fineDisplay}</td>
                    <td style="font-weight:600">${jailDisplay}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        function filterCategory(category, element) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentCategoryFilter = category;
            filterTable();
        }

        function filterTable() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            const rows = document.querySelectorAll('#penalCodesTableBody tr');

            rows.forEach(row => {
                const categoryMatch = (currentCategoryFilter === 'all' || row.getAttribute('data-category') === currentCategoryFilter);
                const nameMatch = row.getAttribute('data-name').includes(query);
                const descMatch = row.getAttribute('data-desc').includes(query);

                if (categoryMatch && (nameMatch || descMatch)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }
